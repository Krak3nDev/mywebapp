---
- name: App system user (no shell, runs the container)
  ansible.builtin.user:
    name: app
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Operator user (restricted sudo on mywebapp + nginx)
  ansible.builtin.user:
    name: operator
    shell: /bin/bash
    state: present
    create_home: true
    password: "{{ operator_password_plain | password_hash('sha512') }}"
    update_password: on_create
