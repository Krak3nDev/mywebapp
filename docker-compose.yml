services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mywebapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-mywebapp}
    volumes:
      - mywebapp-pgdata:/var/lib/postgresql/data
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mywebapp} -d ${POSTGRES_DB:-mywebapp}"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    entrypoint: ["bash", "/opt/app/scripts/migrate.sh"]
    environment:
      MYWEBAPP_DB_HOST: postgres
      MYWEBAPP_DB_PORT: "5432"
      MYWEBAPP_DB_NAME: ${POSTGRES_DB:-mywebapp}
      MYWEBAPP_DB_USER: ${POSTGRES_USER:-mywebapp}
      MYWEBAPP_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mywebapp-net
    restart: "no"

  app:
    build: .
    environment:
      MYWEBAPP_DB_HOST: postgres
      MYWEBAPP_DB_PORT: "5432"
      MYWEBAPP_DB_NAME: ${POSTGRES_DB:-mywebapp}
      MYWEBAPP_DB_USER: ${POSTGRES_USER:-mywebapp}
      MYWEBAPP_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - mywebapp-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health/alive || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${MYWEBAPP_HOST_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/mywebapp.compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mywebapp-net
    restart: unless-stopped

networks:
  mywebapp-net:
    driver: bridge

volumes:
  mywebapp-pgdata:
    name: mywebapp-pgdata
