name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: lint (ruff + mypy + hadolint + shellcheck + yamllint + actionlint)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install dev deps
        run: pip install -e '.[dev]' yamllint

      - name: ruff
        run: ruff check .

      - name: mypy --strict
        run: mypy --strict app

      - name: yamllint
        run: yamllint -c .yamllint .github/workflows docker-compose.yml deploy/compose.prod.yml

      - name: hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_paths: deploy/install.sh deploy/lib

  test:
    name: test (pytest + coverage >=40%)
    runs-on: ubuntu-24.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: install dev deps
        run: pip install -e '.[dev]'

      - name: pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --cov-fail-under=40

      - name: upload coverage html (main + tags only)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30

      - name: upload coverage xml
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

  build:
    name: build (ghcr push)
    runs-on: ubuntu-24.04
    needs: [lint, test]
    if: github.event_name != 'pull_request'
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      GIT_REF: ${{ github.ref }}
      GIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: compute lowercase owner and tags
        id: meta
        run: |
          OWNER_LC="$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')"
          IMG="ghcr.io/${OWNER_LC}/mywebapp"
          if [[ "$GIT_REF" == refs/tags/v* ]]; then
            TAG="${GIT_REF#refs/tags/}"
            TAGS="${IMG}:stable,${IMG}:${TAG}"
          else
            TAGS="${IMG}:latest,${IMG}:sha-${GIT_SHA}"
          fi
          {
            echo "owner_lc=$OWNER_LC"
            echo "image=$IMG"
            echo "tags=$TAGS"
          } >> "$GITHUB_OUTPUT"
          echo "Computed tags: $TAGS"

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: docker login ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.owner_lc }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy (annotated tag only)
    runs-on: [self-hosted, lab3-runner]
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    env:
      GIT_REF: ${{ github.ref }}
      REPO_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: reject lightweight tags
        run: |
          TAG="${GIT_REF#refs/tags/}"
          TYPE="$(git cat-file -t "$TAG")"
          if [[ "$TYPE" != "tag" ]]; then
            echo "::error::lightweight tag '$TAG' (type=$TYPE); annotated tag required (git tag -a vX.Y.Z -m ...)"
            exit 1
          fi
          echo "Confirmed annotated tag: $TAG"

      - name: ssh deploy to target
        env:
          SSH_KEY: ${{ secrets.TARGET_SSH_KEY }}
          TARGET_HOST: ${{ secrets.TARGET_HOST }}
          TARGET_USER: ${{ secrets.TARGET_USER }}
          TARGET_PORT: ${{ secrets.TARGET_PORT }}
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          set -euo pipefail
          OWNER_LC="$(printf '%s' "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')"
          TAG="${GIT_REF#refs/tags/}"
          IMAGE="ghcr.io/${OWNER_LC}/mywebapp:${TAG}"
          PORT="${TARGET_PORT:-22}"
          echo "Deploying $IMAGE to ${TARGET_HOST}:${PORT}"

          mkdir -p ~/.ssh
          install -m 0600 /dev/stdin ~/.ssh/deploy_key <<<"$SSH_KEY"
          ssh-keyscan -p "$PORT" -H "$TARGET_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          export IMAGE OWNER_LC GHCR_TOKEN
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=accept-new \
              "${TARGET_USER}@${TARGET_HOST}" \
              IMAGE="$IMAGE" OWNER_LC="$OWNER_LC" GHCR_TOKEN="$GHCR_TOKEN" bash -se <<'REMOTE'
          set -euo pipefail
          sudo sed -i "s|^IMAGE=.*|IMAGE=${IMAGE}|" /opt/mywebapp/.env
          if [ -n "${GHCR_TOKEN:-}" ]; then
            printf '%s\n' "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$OWNER_LC" --password-stdin
          fi
          sudo systemctl restart mywebapp-container.service
          sudo systemctl --no-pager status mywebapp-container.service | head -20
          REMOTE

  verify:
    name: verify (post-deploy)
    runs-on: [self-hosted, lab3-runner]
    needs: deploy
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: run verify-deploy.sh
        env:
          TARGET: ${{ secrets.TARGET_HOST }}
          TARGET_HTTP_PORT: ${{ secrets.TARGET_HTTP_PORT }}
        run: |
          chmod +x scripts/verify-deploy.sh
          bash scripts/verify-deploy.sh
