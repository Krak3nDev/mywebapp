server {
    listen 0.0.0.0:80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp.access.log;
    error_log  /var/log/nginx/mywebapp.error.log warn;

    # Health endpoints are internal only. ^~ wins over regex matching below.
    location ^~ /health {
        return 404;
    }

    location = / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /items {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/items/[0-9]+$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Default-deny: anything not explicitly allowed above returns 404.
    location / {
        return 404;
    }
}
